<main class="schedule-page__main">
  <h1 class="schedule-page__title">Work Orders</h1>

  <div class="schedule-page__controls">
    <div class="schedule-page__timescale">
      <span class="schedule-page__timescale-label">Timescale</span>
      <ng-select
        class="schedule-page__timescale-select"
        [items]="scaleOptions"
        bindLabel="label"
        bindValue="value"
        [formControl]="scaleControl"
        [searchable]="false"
        [clearable]="false"
      />
    </div>
    <button type="button" class="schedule-page__today" (click)="goToToday()">Today</button>
  </div>

  <app-timeline
    class="schedule-page__timeline"
    [unit]="scaleUnit()"
    (createRequested)="onCreateRequested($event)"
    (editRequested)="onEditRequested($event)"
  />
</main>

@if (panelState(); as state) {
  <app-work-order-panel [state]="state" (closed)="panelState.set(null)" />
}
